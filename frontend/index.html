<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-app.png?v=2" />
    <link rel="shortcut icon" href="/favicon-32.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sehily — Bourses universitaires</title>
    <script>
      // Restore route redirected by 404.html on GitHub Pages
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var q = new URLSearchParams(window.location.search).get('q');
          var path = '/' + p.replace(/~and~/g, '&');
          var query = q ? '?' + q.replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, '/pfe' + path + query + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
