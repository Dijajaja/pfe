databases:
  - name: sehily-db
    databaseName: sehily
    user: sehily
    plan: free

services:
  - type: web
    name: sehily-backend
    env: python
    plan: free
    region: frankfurt
    buildCommand: "cd backend && bash build.sh"
    startCommand: "cd backend && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: sehily-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://dijajaja.github.io"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
